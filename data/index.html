<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Babylon TTS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #05080f;
    color: #c8d8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #00d4d4;
    letter-spacing: -0.03em;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00d4d4;
    box-shadow: 0 0 6px #00d4d4;
    flex-shrink: 0;
  }
  .dot.err { background: #f87171; box-shadow: 0 0 6px #f87171; }

  .card {
    background: #0a0f1a;
    border: 1px solid #1a2540;
    border-radius: 14px;
    padding: 1.75rem;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    color: #4a6080;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.35rem;
  }

  textarea {
    width: 100%;
    height: 130px;
    background: #05080f;
    border: 1px solid #1a2540;
    border-radius: 9px;
    padding: 0.8rem;
    color: #c8d8e8;
    font-size: 1rem;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #00d4d4; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .field { display: flex; flex-direction: column; }

  select {
    background: #05080f;
    border: 1px solid #1a2540;
    border-radius: 9px;
    padding: 0.55rem 0.75rem;
    color: #c8d8e8;
    font-size: 0.9rem;
    outline: none;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus { border-color: #00d4d4; }
  select:disabled { opacity: 0.35; cursor: not-allowed; }

  .speed-row { display: flex; align-items: center; gap: 0.75rem; }
  input[type=range] {
    flex: 1;
    accent-color: #00d4d4;
    cursor: pointer;
  }
  .speed-val {
    font-size: 0.85rem;
    font-weight: 600;
    color: #00d4d4;
    min-width: 3rem;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .buttons { display: flex; gap: 0.75rem; }

  button {
    flex: 1;
    padding: 0.7rem 1rem;
    border-radius: 9px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
  }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-speak   { background: #006e8a; color: #fff; }
  .btn-speak:not(:disabled):hover   { background: #00566d; }
  .btn-phoneme { background: #0a0f1a; color: #c8d8e8; border: 1px solid #1a2540; }
  .btn-phoneme:not(:disabled):hover { background: #0f1828; }

  .status {
    font-size: 0.8rem;
    color: #4a6080;
    min-height: 1.1rem;
    transition: color 0.15s;
  }
  .status.error { color: #f87171; }

  .output {
    background: #05080f;
    border: 1px solid #1a2540;
    border-radius: 9px;
    padding: 1rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }
  .output.visible { display: flex; }

  .phoneme-text {
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 1.05rem;
    color: #00d4d4;
    line-height: 1.6;
    word-break: break-all;
  }

  audio { width: 100%; margin-top: 0.25rem; }
</style>
</head>
<body>

<header>
  <div class="dot" id="health-dot"></div>
  <h1>Babylon TTS</h1>
</header>

<div class="card">
  <div class="field">
    <label for="text">Text</label>
    <textarea id="text" placeholder="Enter text to synthesise or phonemize…"></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label for="engine">Engine</label>
      <select id="engine" onchange="onEngineChange()">
        <option value="kokoro">Kokoro</option>
        <option value="vits">VITS</option>
      </select>
    </div>
    <div class="field">
      <label for="voice">Voice</label>
      <select id="voice"></select>
    </div>
  </div>

  <div class="field">
    <label>Speed</label>
    <div class="speed-row">
      <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0"
             oninput="$('speed-val').textContent = (+this.value).toFixed(2)">
      <span class="speed-val" id="speed-val">1.00</span>
    </div>
  </div>

  <div class="buttons">
    <button class="btn-phoneme" id="btn-phoneme" onclick="phonemize()">Phonemize</button>
    <button class="btn-speak"   id="btn-speak"   onclick="speak()">Speak</button>
  </div>

  <div class="status" id="status"></div>

  <div class="output" id="phoneme-out">
    <label>IPA Phonemes</label>
    <div class="phoneme-text" id="phoneme-text"></div>
  </div>

  <div class="output" id="audio-out">
    <label>Audio</label>
    <audio id="player" controls></audio>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  // ── Voice list ────────────────────────────────────────────────────────────
  async function loadVoices() {
    try {
      const r = await fetch('/voices');
      const voices = await r.json();
      const sel = $('voice');
      sel.innerHTML = '';
      if (voices.length === 0) {
        sel.innerHTML = '<option value="">(no voices found)</option>';
        return;
      }
      voices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = v;
        sel.appendChild(opt);
      });
    } catch (e) {
      setStatus('Could not load voices: ' + e.message, true);
    }
  }

  // ── Status ────────────────────────────────────────────────────────────────
  async function loadStatus() {
    try {
      const r = await fetch('/status');
      const s = await r.json();
      $('health-dot').className = (s.kokoro || s.vits) ? 'dot' : 'dot err';

      for (const opt of $('engine').options) {
        if (opt.value === 'kokoro') opt.disabled = !s.kokoro;
        if (opt.value === 'vits')   opt.disabled = !s.vits;
      }
      for (const opt of $('engine').options) {
        if (!opt.disabled) { $('engine').value = opt.value; break; }
      }
      onEngineChange();
    } catch {
      $('health-dot').className = 'dot err';
    }
  }

  loadVoices();
  loadStatus();

  // ── Engine change ─────────────────────────────────────────────────────────
  function onEngineChange() {
    $('voice').disabled = $('engine').value === 'vits';
  }

  // ── Status helper ─────────────────────────────────────────────────────────
  function setStatus(msg, err) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status' + (err ? ' error' : '');
  }

  function setBusy(busy) {
    $('btn-speak').disabled   = busy;
    $('btn-phoneme').disabled = busy;
  }

  // ── Phonemize ─────────────────────────────────────────────────────────────
  async function phonemize() {
    const text = $('text').value.trim();
    if (!text) { setStatus('Enter some text first.', true); return; }
    setBusy(true);
    setStatus('Phonemizing…');
    try {
      const r = await fetch('/phonemize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await r.json();
      if (!r.ok) { setStatus(data.error || 'Error', true); return; }
      $('phoneme-text').textContent = data.phonemes;
      $('phoneme-out').classList.add('visible');
      $('audio-out').classList.remove('visible');
      setStatus('');
    } catch (e) {
      setStatus('Request failed: ' + e.message, true);
    } finally {
      setBusy(false);
    }
  }

  // ── Speak ─────────────────────────────────────────────────────────────────
  async function speak() {
    const text = $('text').value.trim();
    if (!text) { setStatus('Enter some text first.', true); return; }
    const engine = $('engine').value;
    const voice  = $('voice').value;
    const speed  = parseFloat($('speed').value);
    setBusy(true);
    setStatus('Synthesising…');
    try {
      const body = { text, engine, speed };
      if (engine === 'kokoro' && voice) body.voice = voice;
      const r = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        setStatus(data.error || 'TTS failed', true);
        return;
      }
      const blob = await r.blob();
      const player = $('player');
      if (player.src) URL.revokeObjectURL(player.src);
      player.src = URL.createObjectURL(blob);
      $('phoneme-out').classList.remove('visible');
      $('audio-out').classList.add('visible');
      player.play();
      setStatus('');
    } catch (e) {
      setStatus('Request failed: ' + e.message, true);
    } finally {
      setBusy(false);
    }
  }

  // ── Keyboard shortcut: Ctrl/Cmd+Enter to speak ───────────────────────────
  $('text').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); speak(); }
  });
</script>
</body>
</html>
